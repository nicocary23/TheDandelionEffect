<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Soft rounded-rect background so the icon reads in light and dark browser themes -->
  <rect width="64" height="64" rx="12" fill="#FAF7F2"/>

  <!-- Faint scatter trail behind the cluster -->
  <circle cx="14" cy="14" r="1.6" fill="#C9918A" opacity="0.35"/>
  <circle cx="52" cy="12" r="1.4" fill="#C9918A" opacity="0.30"/>
  <circle cx="8"  cy="42" r="1.2" fill="#C9918A" opacity="0.25"/>
  <circle cx="56" cy="50" r="1.4" fill="#C9918A" opacity="0.30"/>

  <!-- Central deep-green anchor seed -->
  <circle cx="32" cy="36" r="6" fill="#3A5A40"/>

  <!-- Surrounding terracotta seeds in a spiral -->
  <circle cx="42" cy="22" r="5"   fill="#C4704B"/>
  <circle cx="21" cy="23" r="4.5" fill="#C4704B" opacity="0.90"/>
  <circle cx="49" cy="37" r="3.5" fill="#C4704B" opacity="0.78"/>
  <circle cx="14" cy="32" r="3.2" fill="#C9918A" opacity="0.75"/>
  <circle cx="44" cy="50" r="2.8" fill="#C9918A" opacity="0.70"/>
  <circle cx="22" cy="50" r="2.4" fill="#C9918A" opacity="0.60"/>
</svg>
